name: Remote security checks

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    name: Drift detector (prod vs repo)
    # Never expose production credentials to code from an unreviewed branch.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Web schema references vs prod
        env:
          TAVA_DB_URL: ${{ secrets.TAVA_DB_URL }}
        run: |
          if [ -z "$TAVA_DB_URL" ]; then
            echo "::error::TAVA_DB_URL secret is required for the production drift gate."
            exit 1
          fi
          scripts/drift-check.sh
          psql "$TAVA_DB_URL" -v ON_ERROR_STOP=1 -f scripts/prod-security-check.sql
      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1
      - name: Schema drift (prod vs replayed migrations)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD are required for the production drift gate."
            exit 1
          fi
          supabase link --project-ref zgikcbsxzjgbigywxbbj
          # Live-to-live comparison: replay migrations into a real local DB and
          # diff prod against it. The shadow-based `db diff --linked` has a
          # reproducible false positive on the security_invoker view
          # (attendance_summary) — verified byte-identical on 2026-07-10.
          supabase db start
          supabase db reset --local
          # stdout is the diff DDL; CLI progress chatter goes to stderr (streams to log).
          out="$(supabase db diff --from linked --to local --schema public)"
          # Ignore hosted default-privilege noise only after the explicit
          # prod-security-check.sql grant/policy assertions above have passed.
          # Also ignore SET chatter and image names printed on first pull.
          # Structural DDL (tables/columns/functions/views/triggers/indexes/policies)
          # always fails the gate.
          drift="$(echo "$out" | grep -viE '^\s*$|^set |^(grant|revoke) |^alter default privileges |^(ghcr|docker)\.io/|^public\.ecr\.aws/' || true)"
          if [ -n "$drift" ]; then
            echo "Schema drift detected between prod and migration files:"
            echo "$drift"
            exit 1
          fi
          echo "No schema drift."
