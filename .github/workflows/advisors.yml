name: Advisor watch

on:
  schedule:
    - cron: '0 1 * * 1' # weekly, Monday 09:00 SGT
  workflow_dispatch:

permissions:
  contents: read

jobs:
  advisors:
    name: New Supabase advisor findings
    # Scheduled runs always use the default branch. This additional guard keeps
    # a manual dispatch on an unreviewed branch from receiving production access.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Diff advisors against accepted baseline
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is required for advisor monitoring (see HUMANS.md §35)."
            exit 1
          fi
          node scripts/advisor-watch.mjs

  drift:
    name: Production schema drift (read-only)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1
      - name: Compare protected main with production
        env:
          TAVA_DB_URL: ${{ secrets.TAVA_DB_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$TAVA_DB_URL" ] || [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Production read-only drift secrets are not fully configured (see HUMANS.md)."
            exit 1
          fi
          scripts/drift-check.sh
          psql "$TAVA_DB_URL" -v ON_ERROR_STOP=1 -f scripts/prod-security-check.sql
          supabase link --project-ref zgikcbsxzjgbigywxbbj
          supabase db start
          supabase db reset --local
          output="$(supabase db diff --from linked --to local --schema public)"
          drift="$(echo "$output" | grep -viE '^\s*$|^set |^(grant|revoke) |^alter default privileges |^(ghcr|docker)\.io/|^public\.ecr\.aws/' || true)"
          if [ -n "$drift" ]; then
            echo "Schema drift detected between production and protected main:"
            echo "$drift"
            exit 1
          fi
          echo "No production schema drift."
