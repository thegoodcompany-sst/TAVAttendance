name: Advisor watch

on:
  schedule:
    - cron: '0 1 * * 1' # weekly, Monday 09:00 SGT
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/advisor-watch.mjs'
      - 'scripts/advisor-accepted.json'

jobs:
  advisors:
    name: New Supabase advisor findings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Diff advisors against accepted baseline
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN secret not set — advisor watch skipped (see HUMANS.md §35)"
            exit 0
          fi
          node scripts/advisor-watch.mjs
