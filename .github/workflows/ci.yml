name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # Build-time placeholders; the app reads real values at runtime in deploy.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  android:
    name: Android (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Write secrets.properties
        run: |
          cat > secrets.properties <<EOF
          SUPABASE_PROJECT_URL=https://example.supabase.co
          SUPABASE_ANON_KEY=ci-placeholder-anon-key
          EOF
      - run: ./gradlew assembleDebug --no-daemon

  drift:
    name: Drift detector (prod vs repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Web schema references vs prod
        env:
          TAVA_DB_URL: ${{ secrets.TAVA_DB_URL }}
        run: |
          if [ -z "$TAVA_DB_URL" ]; then
            echo "::warning::TAVA_DB_URL secret not set — web schema check skipped (see HUMANS.md)"
            exit 0
          fi
          scripts/drift-check.sh
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Schema drift (supabase db diff --linked)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN / SUPABASE_DB_PASSWORD secrets not set — db diff skipped (see HUMANS.md)"
            exit 0
          fi
          supabase link --project-ref zgikcbsxzjgbigywxbbj
          if ! out="$(supabase db diff --linked --schema public 2>&1)"; then
            # 005_sprint_features.sql uses CREATE POLICY IF NOT EXISTS (invalid
            # Postgres), so the chain cannot replay onto a shadow DB until the
            # HUMANS.md §36 decision. Skip only that failure mode, loudly.
            if echo "$out" | grep -q "failed to provision the shadow database"; then
              echo "::warning::db diff skipped: migration chain not replayable (005 syntax — HUMANS.md §36)"
              exit 0
            fi
            echo "$out"
            exit 1
          fi
          if echo "$out" | grep -qvE '^\s*$|No schema changes found'; then
            echo "Schema drift detected between prod and migration files:"
            echo "$out"
            exit 1
          fi
          echo "No schema drift."

  migrations:
    name: Supabase (db lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Lint migrations
        run: supabase db lint --schema public || echo "db lint reported issues (non-blocking)"
