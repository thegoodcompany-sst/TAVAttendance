name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # Build-time placeholders; the app reads real values at runtime in deploy.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  android:
    name: Android (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Write secrets.properties
        run: |
          cat > secrets.properties <<EOF
          SUPABASE_PROJECT_URL=https://example.supabase.co
          SUPABASE_ANON_KEY=ci-placeholder-anon-key
          EOF
      - run: ./gradlew assembleDebug --no-daemon

  migrations:
    name: Supabase (db lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Lint migrations
        run: supabase db lint --schema public || echo "db lint reported issues (non-blocking)"
