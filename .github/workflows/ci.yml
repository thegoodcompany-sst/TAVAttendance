name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # Build-time placeholders; the app reads real values at runtime in deploy.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  android:
    name: Android (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Write secrets.properties
        run: |
          cat > secrets.properties <<EOF
          SUPABASE_PROJECT_URL=https://example.supabase.co
          SUPABASE_ANON_KEY=ci-placeholder-anon-key
          EOF
      - run: ./gradlew assembleDebug --no-daemon

  drift:
    name: Drift detector (prod vs repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Web schema references vs prod
        env:
          TAVA_DB_URL: ${{ secrets.TAVA_DB_URL }}
        run: |
          if [ -z "$TAVA_DB_URL" ]; then
            echo "::warning::TAVA_DB_URL secret not set — web schema check skipped (see HUMANS.md)"
            exit 0
          fi
          scripts/drift-check.sh
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Schema drift (supabase db diff --linked)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN / SUPABASE_DB_PASSWORD secrets not set — db diff skipped (see HUMANS.md)"
            exit 0
          fi
          supabase link --project-ref zgikcbsxzjgbigywxbbj
          # Live-to-live comparison: replay migrations into a real local DB and
          # diff prod against it. The shadow-based `db diff --linked` has a
          # reproducible false positive on the security_invoker view
          # (attendance_summary) — verified byte-identical on 2026-07-10.
          supabase db start
          supabase db reset --local
          # stdout is the diff DDL; CLI progress chatter goes to stderr (streams to log).
          out="$(supabase db diff --from linked --to local --schema public)"
          # Table-level grant/revoke lines are platform-privilege noise: the shadow
          # DB's default privileges differ from a hosted project's, and RLS is the
          # real gate. Everything else in the DDL is drift.
          # (also drop container-image names the CLI echoes to stdout on first pull)
          drift="$(echo "$out" | grep -vE '^\s*$|^set check_function_bodies|^(grant|revoke) |^(ghcr|docker)\.io/|^public\.ecr\.aws/' || true)"
          if [ -n "$drift" ]; then
            echo "Schema drift detected between prod and migration files:"
            echo "$drift"
            exit 1
          fi
          echo "No schema drift."

  migrations:
    name: Supabase (db lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Lint migrations
        run: supabase db lint --schema public || echo "db lint reported issues (non-blocking)"
