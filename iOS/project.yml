name: TAVAttendance
options:
  bundleIdPrefix: com.tava
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""

targets:
  TAVAttendance:
    type: application
    platform: iOS
    sources:
      - path: TAVAttendance
    info:
      path: TAVAttendance/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: TAV Attendance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tava.TAVAttendance
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
