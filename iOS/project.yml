name: TAVAttendance
options:
  bundleIdPrefix: com.tava
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

fileTypes:
  xcstrings:
    buildPhase: resources

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  TAVAttendance:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TAVAttendance
    info:
      path: TAVAttendance/Info.plist
      properties:
        CFBundleDisplayName: TAVAttendance
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        # Supabase credentials: values live in the gitignored Config.xcconfig;
        # Info.plist only references the build settings (so secrets stay out of source).
        # Read at runtime via Bundle.main.object(forInfoDictionaryKey:) in SupabaseManager.
        SUPABASE_PROJECT_URL: "$(SUPABASE_PROJECT_URL)"
        SUPABASE_ANON_KEY: "$(SUPABASE_ANON_KEY)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    # PROD-02: aps-environment entitlement removed 2026-07-11 — personal Apple
    # teams cannot sign the Push capability, blocking all device builds.
    # Restore per HUMANS.md 38 once on a paid Apple Developer team:
    #   entitlements:
    #     path: TAVAttendance/TAVAttendance.entitlements
    #     properties:
    #       aps-environment: development
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.tava.TAVAttendance
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: "DUU8J39BA7"
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig

  TAVAttendanceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TAVAttendanceTests
    dependencies:
      - target: TAVAttendance
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.tava.TAVAttendanceTests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  TAVAttendance:
    build:
      targets:
        TAVAttendance: all
        TAVAttendanceTests: [test]
    test:
      targets:
        - TAVAttendanceTests
